<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhotoPackager Performance Memory Test</title>
    <style>
        body {
            font-family: monospace;
            background: #1a1a1a;
            color: #00aeff;
            padding: 2rem;
            line-height: 1.6;
        }
        .test-section {
            background: #2a2a2a;
            border: 1px solid #00aeff;
            border-radius: 10px;
            padding: 1rem;
            margin: 1rem 0;
        }
        .test-pass { color: #00ff00; }
        .test-fail { color: #ff0000; }
        .test-warn { color: #ffaa00; }
        button {
            background: #00aeff;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 5px;
            margin: 0.5rem;
            cursor: pointer;
        }
        button:hover { background: #0088cc; }
        #console { 
            background: #000; 
            color: #0f0; 
            padding: 1rem; 
            border-radius: 5px;
            height: 300px; 
            overflow-y: scroll; 
            font-family: monospace;
            font-size: 0.8rem;
        }
        .status { font-weight: bold; }
        .memory-stats {
            background: #333;
            padding: 1rem;
            border-radius: 5px;
            margin: 0.5rem 0;
        }
    </style>
</head>
<body>
    <h1>🔧 PhotoPackager Performance Memory Leak Tests</h1>
    
    <div class="test-section">
        <h2>🎯 HIGH-001: PerformanceObserver Memory Leak</h2>
        <div id="performanceStatus" class="status test-warn">Testing...</div>
        <button onclick="testPerformanceObserverLeak()">Test PerformanceObserver Cleanup</button>
        <button onclick="stressTestPerformanceObserver()">Stress Test Observer</button>
    </div>

    <div class="test-section">
        <h2>⏱️ HIGH-002: setInterval Memory Leak</h2>
        <div id="intervalStatus" class="status test-warn">Testing...</div>
        <button onclick="testSetIntervalLeak()">Test setInterval Cleanup</button>
        <button onclick="stressTestIntervals()">Stress Test Intervals</button>
    </div>

    <div class="test-section">
        <h2>📊 Memory Monitoring</h2>
        <div class="memory-stats" id="memoryStats">Initializing...</div>
        <button onclick="startMemoryMonitoring()">Start Memory Monitoring</button>
        <button onclick="stopMemoryMonitoring()">Stop Memory Monitoring</button>
        <button onclick="forceGarbageCollection()">Force GC (if available)</button>
    </div>

    <div class="test-section">
        <h2>📝 Console Output</h2>
        <div id="console"></div>
        <button onclick="clearConsole()">Clear Console</button>
    </div>

    <script type="module">
        import { PerformanceOptimizer } from './src/js/PerformanceOptimizer.js';
        import { logger } from './src/js/Logger.js';

        let testResults = [];
        let memoryMonitorInterval = null;
        let createdOptimizers = [];
        let baselineMemory = null;

        function log(message, type = 'info') {
            const console = document.getElementById('console');
            const timestamp = new Date().toLocaleTimeString();
            const color = type === 'error' ? '#ff0000' : type === 'success' ? '#00ff00' : '#0f0';
            console.innerHTML += `<div style="color: ${color}">[${timestamp}] ${message}</div>`;
            console.scrollTop = console.scrollHeight;
        }
        
        function clearConsole() {
            document.getElementById('console').innerHTML = '';
        }
        
        function updateStatus(elementId, status, type) {
            const element = document.getElementById(elementId);
            element.textContent = status;
            element.className = `status test-${type}`;
        }

        function getMemoryInfo() {
            if (performance.memory) {
                return {
                    used: Math.round(performance.memory.usedJSHeapSize / 1024 / 1024),
                    total: Math.round(performance.memory.totalJSHeapSize / 1024 / 1024),
                    limit: Math.round(performance.memory.jsHeapSizeLimit / 1024 / 1024)
                };
            }
            return null;
        }

        function updateMemoryDisplay() {
            const memory = getMemoryInfo();
            const memoryDiv = document.getElementById('memoryStats');
            
            if (memory) {
                const usage = ((memory.used / memory.limit) * 100).toFixed(1);
                memoryDiv.innerHTML = `
                    <strong>Memory Usage:</strong> ${memory.used}MB / ${memory.limit}MB (${usage}%)<br>
                    <strong>Total Heap:</strong> ${memory.total}MB<br>
                    <strong>Optimizers Created:</strong> ${createdOptimizers.length}<br>
                    <strong>Active Intervals:</strong> ${getActiveIntervalCount()}
                `;
                
                if (usage > 80) {
                    memoryDiv.style.color = '#ff0000';
                } else if (usage > 60) {
                    memoryDiv.style.color = '#ffaa00';
                } else {
                    memoryDiv.style.color = '#00ff00';
                }
            } else {
                memoryDiv.innerHTML = 'Memory API not available in this browser';
            }
        }

        function getActiveIntervalCount() {
            // This is an approximation - we track what we create
            return createdOptimizers.filter(opt => opt && opt.isActive).length;
        }

        async function testPerformanceObserverLeak() {
            log('Testing PerformanceObserver memory leak prevention...');
            
            try {
                const initialMemory = getMemoryInfo();
                if (!initialMemory) {
                    throw new Error('Memory API not available - cannot test memory leaks');
                }
                
                log(`Initial memory: ${initialMemory.used}MB`);
                
                // Create multiple PerformanceOptimizers and destroy them
                const optimizerCount = 50;
                const createdIds = [];
                
                for (let i = 0; i < optimizerCount; i++) {
                    const optimizer = new PerformanceOptimizer();
                    createdOptimizers.push(optimizer);
                    createdIds.push(`optimizer_${i}`);
                    
                    // Initialize with some fake processing
                    optimizer.startProcessing(createdIds[i], 10, 1024 * 1024 * 5); // 5MB fake processing
                    
                    // Immediately clean up
                    optimizer.cleanup();
                    
                    if (i % 10 === 0) {
                        log(`Created and cleaned up ${i + 1}/${optimizerCount} optimizers`);
                        await new Promise(resolve => setTimeout(resolve, 10));
                    }
                }
                
                // Force garbage collection if available
                if (window.gc) {
                    window.gc();
                    log('Forced garbage collection');
                }
                
                // Wait a bit for cleanup
                await new Promise(resolve => setTimeout(resolve, 1000));
                
                const finalMemory = getMemoryInfo();
                const memoryDiff = finalMemory.used - initialMemory.used;
                
                log(`Final memory: ${finalMemory.used}MB`);
                log(`Memory difference: ${memoryDiff}MB`);
                
                // Check if memory increased significantly (more than 10MB suggests a leak)
                if (memoryDiff > 10) {
                    updateStatus('performanceStatus', '❌ Possible Memory Leak Detected', 'fail');
                    log(`WARNING: Memory increased by ${memoryDiff}MB after cleanup`, 'error');
                } else {
                    updateStatus('performanceStatus', '✅ PerformanceObserver Cleanup Working', 'pass');
                    log('PerformanceObserver memory leak test passed!', 'success');
                }
                
            } catch (error) {
                log(`PerformanceObserver test failed: ${error.message}`, 'error');
                updateStatus('performanceStatus', '❌ PerformanceObserver Test Failed', 'fail');
            }
        }

        async function stressTestPerformanceObserver() {
            log('Running PerformanceObserver stress test...');
            
            try {
                const stressCount = 100;
                const optimizers = [];
                
                // Create many optimizers rapidly
                for (let i = 0; i < stressCount; i++) {
                    const optimizer = new PerformanceOptimizer();
                    optimizers.push(optimizer);
                    
                    if (i % 20 === 0) {
                        log(`Created ${i + 1}/${stressCount} optimizers`);
                        await new Promise(resolve => setTimeout(resolve, 1));
                    }
                }
                
                log('Cleaning up all optimizers...');
                
                // Clean them all up
                for (let i = 0; i < optimizers.length; i++) {
                    optimizers[i].cleanup();
                    
                    if (i % 20 === 0) {
                        log(`Cleaned up ${i + 1}/${stressCount} optimizers`);
                        await new Promise(resolve => setTimeout(resolve, 1));
                    }
                }
                
                log('Stress test completed successfully', 'success');
                
            } catch (error) {
                log(`Stress test failed: ${error.message}`, 'error');
            }
        }

        async function testSetIntervalLeak() {
            log('Testing setInterval memory leak prevention...');
            
            try {
                const initialMemory = getMemoryInfo();
                if (!initialMemory) {
                    throw new Error('Memory API not available - cannot test memory leaks');
                }
                
                log(`Initial memory: ${initialMemory.used}MB`);
                
                // Create multiple optimizers with intervals
                const optimizerCount = 20;
                const optimizers = [];
                
                for (let i = 0; i < optimizerCount; i++) {
                    const optimizer = new PerformanceOptimizer();
                    optimizers.push(optimizer);
                    
                    // Start memory monitoring (creates intervals)
                    optimizer.startMemoryMonitoring();
                    
                    if (i % 5 === 0) {
                        log(`Created ${i + 1}/${optimizerCount} optimizers with intervals`);
                        await new Promise(resolve => setTimeout(resolve, 50));
                    }
                }
                
                // Let intervals run for a bit
                await new Promise(resolve => setTimeout(resolve, 2000));
                
                log('Cleaning up all optimizers and their intervals...');
                
                // Clean them all up
                optimizers.forEach((optimizer, index) => {
                    optimizer.cleanup();
                    if (index % 5 === 0) {
                        log(`Cleaned up optimizer ${index + 1}/${optimizerCount}`);
                    }
                });
                
                // Wait for cleanup
                await new Promise(resolve => setTimeout(resolve, 1000));
                
                if (window.gc) {
                    window.gc();
                    log('Forced garbage collection');
                }
                
                const finalMemory = getMemoryInfo();
                const memoryDiff = finalMemory.used - initialMemory.used;
                
                log(`Final memory: ${finalMemory.used}MB`);
                log(`Memory difference: ${memoryDiff}MB`);
                
                // Check for memory leaks
                if (memoryDiff > 5) {
                    updateStatus('intervalStatus', '❌ Possible setInterval Leak Detected', 'fail');
                    log(`WARNING: Memory increased by ${memoryDiff}MB after cleanup`, 'error');
                } else {
                    updateStatus('intervalStatus', '✅ setInterval Cleanup Working', 'pass');
                    log('setInterval memory leak test passed!', 'success');
                }
                
            } catch (error) {
                log(`setInterval test failed: ${error.message}`, 'error');
                updateStatus('intervalStatus', '❌ setInterval Test Failed', 'fail');
            }
        }

        async function stressTestIntervals() {
            log('Running setInterval stress test...');
            
            try {
                const intervals = [];
                const intervalCount = 50;
                
                // Create many intervals
                for (let i = 0; i < intervalCount; i++) {
                    const intervalId = setInterval(() => {
                        // Simulate some work
                        const data = new Array(1000).fill(Math.random());
                    }, 100);
                    intervals.push(intervalId);
                    
                    if (i % 10 === 0) {
                        log(`Created ${i + 1}/${intervalCount} intervals`);
                        await new Promise(resolve => setTimeout(resolve, 10));
                    }
                }
                
                // Let them run briefly
                await new Promise(resolve => setTimeout(resolve, 1000));
                
                log('Clearing all intervals...');
                
                // Clear all intervals
                intervals.forEach((intervalId, index) => {
                    clearInterval(intervalId);
                    if (index % 10 === 0) {
                        log(`Cleared ${index + 1}/${intervalCount} intervals`);
                    }
                });
                
                log('Interval stress test completed successfully', 'success');
                
            } catch (error) {
                log(`Interval stress test failed: ${error.message}`, 'error');
            }
        }

        function startMemoryMonitoring() {
            if (memoryMonitorInterval) {
                clearInterval(memoryMonitorInterval);
            }
            
            memoryMonitorInterval = setInterval(() => {
                updateMemoryDisplay();
            }, 1000);
            
            log('Memory monitoring started');
        }

        function stopMemoryMonitoring() {
            if (memoryMonitorInterval) {
                clearInterval(memoryMonitorInterval);
                memoryMonitorInterval = null;
            }
            log('Memory monitoring stopped');
        }

        function forceGarbageCollection() {
            if (window.gc) {
                window.gc();
                log('Forced garbage collection');
                setTimeout(updateMemoryDisplay, 100);
            } else {
                log('Garbage collection not available (try running with --js-flags="--expose-gc")', 'warn');
            }
        }

        // Make functions globally available
        window.testPerformanceObserverLeak = testPerformanceObserverLeak;
        window.stressTestPerformanceObserver = stressTestPerformanceObserver;
        window.testSetIntervalLeak = testSetIntervalLeak;
        window.stressTestIntervals = stressTestIntervals;
        window.startMemoryMonitoring = startMemoryMonitoring;
        window.stopMemoryMonitoring = stopMemoryMonitoring;
        window.forceGarbageCollection = forceGarbageCollection;
        window.clearConsole = clearConsole;

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            log('PhotoPackager Performance Memory Test initialized');
            updateMemoryDisplay();
            startMemoryMonitoring();
            
            // Auto-run basic test
            setTimeout(() => {
                log('Auto-running PerformanceObserver leak test...');
                testPerformanceObserverLeak();
            }, 1000);
        });
    </script>
</body>
</html>

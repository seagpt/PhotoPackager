<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhotoPackager Event Listener Cleanup Test</title>
    <style>
        body {
            font-family: monospace;
            background: #1a1a1a;
            color: #00aeff;
            padding: 2rem;
            line-height: 1.6;
        }
        .test-section {
            background: #2a2a2a;
            border: 1px solid #00aeff;
            border-radius: 10px;
            padding: 1rem;
            margin: 1rem 0;
        }
        .test-pass { color: #00ff00; }
        .test-fail { color: #ff0000; }
        .test-warn { color: #ffaa00; }
        button {
            background: #00aeff;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 5px;
            margin: 0.5rem;
            cursor: pointer;
        }
        button:hover { background: #0088cc; }
        #console { 
            background: #000; 
            color: #0f0; 
            padding: 1rem; 
            border-radius: 5px;
            height: 300px; 
            overflow-y: scroll; 
            font-family: monospace;
            font-size: 0.8rem;
        }
        .status { font-weight: bold; }
        .listener-stats {
            background: #333;
            padding: 1rem;
            border-radius: 5px;
            margin: 0.5rem 0;
        }
    </style>
</head>
<body>
    <h1>🧹 PhotoPackager Event Listener Cleanup Tests</h1>
    
    <div class="test-section">
        <h2>🎯 HIGH-003: AccessibilityManager Event Cleanup</h2>
        <div id="accessibilityStatus" class="status test-warn">Testing...</div>
        <button onclick="testAccessibilityCleanup()">Test AccessibilityManager Cleanup</button>
    </div>

    <div class="test-section">
        <h2>📊 Event Listener Statistics</h2>
        <div class="listener-stats" id="listenerStats">Initializing...</div>
        <button onclick="updateListenerStats()">Update Stats</button>
        <button onclick="simulateEventListeners()">Simulate Many Listeners</button>
    </div>

    <div class="test-section">
        <h2>🎹 Keyboard & Mouse Event Tests</h2>
        <div id="eventStatus" class="status test-warn">Testing...</div>
        <button onclick="testEventHandling()">Test Event Handling</button>
        <button onclick="testEventCleanupEffectiveness()">Test Cleanup Effectiveness</button>
    </div>

    <div class="test-section">
        <h2>📝 Console Output</h2>
        <div id="console"></div>
        <button onclick="clearConsole()">Clear Console</button>
    </div>

    <script type="module">
        import { AccessibilityManager } from './src/js/AccessibilityManager.js';
        import { logger } from './src/js/Logger.js';

        let testResults = [];
        let accessibilityInstance = null;
        let eventFiredCount = 0;

        function log(message, type = 'info') {
            const console = document.getElementById('console');
            const timestamp = new Date().toLocaleTimeString();
            const color = type === 'error' ? '#ff0000' : type === 'success' ? '#00ff00' : '#0f0';
            console.innerHTML += `<div style="color: ${color}">[${timestamp}] ${message}</div>`;
            console.scrollTop = console.scrollHeight;
        }
        
        function clearConsole() {
            document.getElementById('console').innerHTML = '';
        }
        
        function updateStatus(elementId, status, type) {
            const element = document.getElementById(elementId);
            element.textContent = status;
            element.className = `status test-${type}`;
        }

        function updateListenerStats() {
            const stats = document.getElementById('listenerStats');
            
            // Count various listener types by inspecting the DOM
            const elementsWithListeners = document.querySelectorAll('[onclick], input, button, a, select, textarea');
            const forms = document.querySelectorAll('form');
            
            let listenerCount = 0;
            
            // This is an approximation since we can't directly count event listeners
            listenerCount += elementsWithListeners.length;
            listenerCount += forms.length * 2; // Usually submit and reset
            
            // Add our accessibility manager listeners if active
            if (accessibilityInstance && accessibilityInstance.eventListeners) {
                listenerCount += accessibilityInstance.eventListeners.length;
            }
            
            stats.innerHTML = `
                <strong>Estimated Active Listeners:</strong> ${listenerCount}<br>
                <strong>AccessibilityManager Tracked:</strong> ${accessibilityInstance?.eventListeners?.length || 0}<br>
                <strong>DOM Elements with Events:</strong> ${elementsWithListeners.length}<br>
                <strong>Event Fires Count:</strong> ${eventFiredCount}<br>
                <strong>Accessibility Instance:</strong> ${accessibilityInstance ? 'Active' : 'None'}
            `;
        }

        async function testAccessibilityCleanup() {
            log('Testing AccessibilityManager event cleanup...');
            
            try {
                // Create a new AccessibilityManager instance
                accessibilityInstance = new AccessibilityManager();
                log(`AccessibilityManager created with ${accessibilityInstance.eventListeners.length} tracked listeners`);
                
                // Wait for setup to complete
                await new Promise(resolve => setTimeout(resolve, 500));
                
                const initialListenerCount = accessibilityInstance.eventListeners.length;
                log(`Initial listener count: ${initialListenerCount}`);
                
                // Trigger some events to verify they're working
                document.dispatchEvent(new KeyboardEvent('keydown', { key: 'Tab' }));
                document.dispatchEvent(new MouseEvent('mousedown'));
                
                // Verify listeners are still active
                if (accessibilityInstance.eventListeners.length > 0) {
                    log(`✓ Event listeners are active (${accessibilityInstance.eventListeners.length})`);
                } else {
                    throw new Error('No event listeners were registered');
                }
                
                // Test cleanup
                log('Calling cleanup...');
                accessibilityInstance.cleanup();
                
                // Verify cleanup
                const remainingListeners = accessibilityInstance.eventListeners.length;
                log(`Listeners after cleanup: ${remainingListeners}`);
                
                // Test that events no longer fire (approximately)
                const beforeEventCount = eventFiredCount;
                document.dispatchEvent(new KeyboardEvent('keydown', { key: 'Tab' }));
                document.dispatchEvent(new MouseEvent('mousedown'));
                await new Promise(resolve => setTimeout(resolve, 100));
                
                if (remainingListeners === 0) {
                    updateStatus('accessibilityStatus', '✅ AccessibilityManager Cleanup Working', 'pass');
                    log('AccessibilityManager cleanup test passed!', 'success');
                } else {
                    updateStatus('accessibilityStatus', '❌ AccessibilityManager Cleanup Failed', 'fail');
                    log(`Cleanup failed: ${remainingListeners} listeners still active`, 'error');
                }
                
                accessibilityInstance = null;
                
            } catch (error) {
                log(`AccessibilityManager test failed: ${error.message}`, 'error');
                updateStatus('accessibilityStatus', '❌ AccessibilityManager Test Failed', 'fail');
            }
        }

        function simulateEventListeners() {
            log('Simulating additional event listeners...');
            
            // Create some test elements with listeners
            const testContainer = document.createElement('div');
            testContainer.id = 'test-container';
            document.body.appendChild(testContainer);
            
            for (let i = 0; i < 10; i++) {
                const button = document.createElement('button');
                button.textContent = `Test Button ${i + 1}`;
                button.addEventListener('click', () => {
                    eventFiredCount++;
                    log(`Test button ${i + 1} clicked (total: ${eventFiredCount})`);
                });
                testContainer.appendChild(button);
            }
            
            log('Added 10 test buttons with click listeners');
            updateListenerStats();
        }

        async function testEventHandling() {
            log('Testing event handling functionality...');
            
            try {
                // Create instance if needed
                if (!accessibilityInstance) {
                    accessibilityInstance = new AccessibilityManager();
                    await new Promise(resolve => setTimeout(resolve, 300));
                }
                
                const initialCount = eventFiredCount;
                
                // Simulate keyboard navigation
                document.dispatchEvent(new KeyboardEvent('keydown', { key: 'Tab' }));
                await new Promise(resolve => setTimeout(resolve, 50));
                
                // Check if keyboard nav was enabled
                const hasKeyboardClass = document.body.classList.contains('keyboard-nav');
                if (hasKeyboardClass) {
                    log('✓ Keyboard navigation properly activated');
                } else {
                    log('⚠ Keyboard navigation class not found');
                }
                
                // Test mouse event
                document.dispatchEvent(new MouseEvent('mousedown'));
                await new Promise(resolve => setTimeout(resolve, 50));
                
                const stillHasKeyboardClass = document.body.classList.contains('keyboard-nav');
                if (!stillHasKeyboardClass) {
                    log('✓ Mouse event properly disabled keyboard navigation');
                } else {
                    log('⚠ Keyboard navigation class not removed by mouse event');
                }
                
                updateStatus('eventStatus', '✅ Event Handling Working', 'pass');
                log('Event handling test passed!', 'success');
                
            } catch (error) {
                log(`Event handling test failed: ${error.message}`, 'error');
                updateStatus('eventStatus', '❌ Event Handling Failed', 'fail');
            }
        }

        async function testEventCleanupEffectiveness() {
            log('Testing cleanup effectiveness...');
            
            try {
                // Create multiple instances and clean them up
                const instances = [];
                for (let i = 0; i < 5; i++) {
                    const instance = new AccessibilityManager();
                    instances.push(instance);
                    log(`Created instance ${i + 1} with ${instance.eventListeners.length} listeners`);
                    await new Promise(resolve => setTimeout(resolve, 100));
                }
                
                let totalListenersBefore = 0;
                instances.forEach(instance => {
                    totalListenersBefore += instance.eventListeners.length;
                });
                
                log(`Total listeners before cleanup: ${totalListenersBefore}`);
                
                // Clean up all instances
                instances.forEach((instance, index) => {
                    instance.cleanup();
                    log(`Cleaned up instance ${index + 1}`);
                });
                
                let totalListenersAfter = 0;
                instances.forEach(instance => {
                    totalListenersAfter += instance.eventListeners.length;
                });
                
                log(`Total listeners after cleanup: ${totalListenersAfter}`);
                
                if (totalListenersAfter === 0) {
                    log('✅ All event listeners properly cleaned up', 'success');
                    updateStatus('eventStatus', '✅ Cleanup Effectiveness Verified', 'pass');
                } else {
                    log(`❌ ${totalListenersAfter} listeners still active after cleanup`, 'error');
                    updateStatus('eventStatus', '❌ Cleanup Not Fully Effective', 'fail');
                }
                
            } catch (error) {
                log(`Cleanup effectiveness test failed: ${error.message}`, 'error');
                updateStatus('eventStatus', '❌ Cleanup Test Failed', 'fail');
            }
        }

        // Make functions globally available
        window.testAccessibilityCleanup = testAccessibilityCleanup;
        window.testEventHandling = testEventHandling;
        window.testEventCleanupEffectiveness = testEventCleanupEffectiveness;
        window.simulateEventListeners = simulateEventListeners;
        window.updateListenerStats = updateListenerStats;
        window.clearConsole = clearConsole;

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            log('PhotoPackager Event Listener Cleanup Test initialized');
            updateListenerStats();
            
            // Auto-run basic test
            setTimeout(() => {
                log('Auto-running AccessibilityManager cleanup test...');
                testAccessibilityCleanup();
            }, 1000);
        });

        // Update stats periodically
        setInterval(updateListenerStats, 5000);
    </script>
</body>
</html>

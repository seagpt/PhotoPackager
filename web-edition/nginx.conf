events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    
    # Enable gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_types
        application/javascript
        application/json
        text/css
        text/javascript
        text/xml
        text/plain;
    
    # Comprehensive security headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), magnetometer=(), accelerometer=(), gyroscope=()" always;
    
    # Content Security Policy - Enhanced security for PhotoPackager (ASAP-031)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'sha384-+mbV2IY1Zk/X1p/nWllGySJSUN8uMs+gUAN10Or95UBH0fpj6GfKgPmgC5EXieXG' 'sha384-mjCisVk+9cQGYprByJbHxzwFO7BVEgR6iCftsCqnmHNKA8uzLYoRng5h1qKMvHjp' https://cdnjs.cloudflare.com https://plausible.io https://analytics.umami.is; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' https://webhook.site https://httpbin.org https://plausible.io https://analytics.umami.is; worker-src 'none'; object-src 'none'; media-src 'self' blob:; frame-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests;" always;
    
    # HSTS for HTTPS (will be ignored on HTTP)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    
    # Additional security
    add_header X-Robots-Tag "noindex, nofollow" always;
    add_header X-DNS-Prefetch-Control "off" always;
    
    # Rate limiting for security (define outside server block)
    limit_req_zone $binary_remote_addr zone=main:10m rate=10r/s;
    
    server {
        listen 8080;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;
        
        # Hide server information
        server_tokens off;
        
        # Limit request size (100MB for large photo uploads)
        client_max_body_size 100M;
        client_body_timeout 60s;
        client_header_timeout 60s;
        
        # Enable client-side routing
        location / {
            try_files $uri $uri/ /index.html;
            
            # Additional security for main routes
            add_header X-Content-Type-Options nosniff always;
        }
        
        # Cache static assets with security headers
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
            expires 1y;
            add_header Cache-Control "public, immutable" always;
            add_header X-Content-Type-Options nosniff always;
        }
        
        # Security for sensitive files - deny access
        location ~* \.(env|gitignore|dockerignore|md|txt|log|conf|bak|backup|old|tmp)$ {
            deny all;
            return 404;
        }
        
        # Deny access to hidden files
        location ~ /\. {
            deny all;
            return 404;
        }
        
        # Block common exploit attempts
        location ~* \.(php|asp|aspx|jsp|cgi|pl|py|rb)$ {
            deny all;
            return 404;
        }
        
        # Block access to common admin/system paths
        location ~* /(admin|wp-admin|phpmyadmin|myadmin|mysql|sql|database|config|install|setup|test|debug|trace|error|log)/ {
            deny all;
            return 404;
        }
        
        # Apply rate limiting
        limit_req zone=main burst=20 nodelay;
    }
}
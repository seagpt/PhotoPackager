name: PhotoPackager CI/CD

# Trigger the workflow on push to main branch and on all pull requests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

# Set environment variables
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Test job - runs on all pushes and PRs
  test:
    runs-on: ubuntu-latest
    name: 🧪 Run Tests
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
    
    - name: 🟢 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: 'web-edition/package.json'
    
    - name: 📦 Install dependencies
      run: |
        cd web-edition
        npm ci || npm install
    
    - name: 🧪 Run backend tests
      run: |
        cd web-edition
        node test-backend.js
    
    - name: 📊 Upload test results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: test-results
        path: web-edition/test-results.xml
        retention-days: 30

  # Lint and code quality job
  lint:
    runs-on: ubuntu-latest
    name: 🔍 Code Quality
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
    
    - name: 🟢 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    
    - name: 🔍 Run ESLint (if config exists)
      run: |
        cd web-edition
        if [ -f "package.json" ] && grep -q "eslint" package.json; then
          npm ci
          npm run lint || echo "No lint script found, skipping"
        else
          echo "No ESLint configuration found, skipping"
        fi

  # Security scan
  security:
    runs-on: ubuntu-latest
    name: 🔒 Security Scan
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
    
    - name: 🔒 Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
    
    - name: 📤 Upload Trivy scan results
      uses: github/codeql-action/upload-sarif@v2
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'

  # Build and test Docker image
  build:
    runs-on: ubuntu-latest
    needs: [test, lint]
    name: 🐳 Build Docker Image
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
    
    - name: 🐳 Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: 🔑 Log in to Container Registry
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: 🏷️ Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}
    
    - name: 🔨 Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        platforms: linux/amd64,linux/arm64
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
    
    - name: 🧪 Test Docker image
      run: |
        docker run --rm -d -p 8080:80 --name test-container ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest || \
        docker run --rm -d -p 8080:80 --name test-container photopackager-web:latest
        
        # Wait for container to start
        sleep 10
        
        # Test the endpoint
        curl -f http://localhost:8080 || (echo "Health check failed" && exit 1)
        
        # Cleanup
        docker stop test-container || true

  # Deploy to staging (only on main branch)
  deploy-staging:
    runs-on: ubuntu-latest
    needs: [build, security]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    name: 🚀 Deploy to Staging
    environment: staging
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
    
    - name: 🚀 Deploy to Railway (if configured)
      env:
        RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      run: |
        if [ -n "$RAILWAY_TOKEN" ]; then
          echo "Deploying to Railway..."
          npm install -g @railway/cli
          railway login --token $RAILWAY_TOKEN
          railway up --detach
        else
          echo "RAILWAY_TOKEN not set, skipping Railway deployment"
          echo "Manual deployment required or configure Railway token in repository secrets"
        fi
    
    - name: 🌐 Create deployment status
      uses: actions/github-script@v7
      with:
        script: |
          github.rest.repos.createDeploymentStatus({
            owner: context.repo.owner,
            repo: context.repo.repo,
            deployment_id: context.payload.deployment?.id || 1,
            state: 'success',
            environment_url: 'https://your-app-url.railway.app',
            description: 'Deployed to staging'
          })

  # Notification job
  notify:
    runs-on: ubuntu-latest
    needs: [test, build, deploy-staging]
    if: always()
    name: 📢 Notify Results
    
    steps:
    - name: 📢 Slack Notification (if configured)
      env:
        SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
      run: |
        if [ -n "$SLACK_WEBHOOK" ]; then
          STATUS="${{ needs.test.result == 'success' && needs.build.result == 'success' && 'success' || 'failure' }}"
          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"PhotoPackager CI/CD $STATUS for commit ${{ github.sha }}\"}" \
            $SLACK_WEBHOOK
        else
          echo "SLACK_WEBHOOK not configured, skipping notification"
        fi

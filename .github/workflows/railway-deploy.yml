name: Deploy to Railway

on:
  workflow_run:
    workflows: ["PhotoPackager CI/CD"]
    types:
      - completed
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        
      - name: 🚄 Deploy to Railway
        uses: railway-app/railway-deploy-action@v1.0.1
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN }}
          service: "photopackager-web"